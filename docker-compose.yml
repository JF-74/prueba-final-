services:
  pipeline:
    build: .
    volumes:
      - .:/workspace
    working_dir: /workspace

  prefect-server:
    build: .
    volumes:
      - .:/workspace
      - prefect-data:/root/.prefect
    working_dir: /workspace
    ports:
      - "4200:4200"
    environment:
      - PREFECT_HOME=/root/.prefect
    command: prefect server start --host 0.0.0.0

  dashboard:
    build: .
    volumes:
      - .:/workspace
    working_dir: /workspace
    ports:
      - "8050:8050"
    command: python dashboard/app.py

  jupyter:
    build: .
    volumes:
      - .:/workspace
    working_dir: /workspace
    ports:
      - "8888:8888"
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''

volumes:
  prefect-data:
